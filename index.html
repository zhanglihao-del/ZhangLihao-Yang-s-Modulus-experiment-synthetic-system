<script>
// ========== 导航切换JS（完全不用动） ==========
const navItems = document.querySelectorAll('.nav-item');
const pageBoxs = document.querySelectorAll('.page-box');
navItems.forEach(item=>{
    item.onclick = function(){
        // 清空所有激活
        navItems.forEach(nav=>nav.classList.remove('active'));
        pageBoxs.forEach(page=>page.classList.remove('active'));
        // 当前选中激活
        this.classList.add('active');
        const targetId = this.getAttribute('data-page');
        document.getElementById(targetId).classList.add('active');
    }
})

// ========== 新增：提交反馈函数 ==========
function submitFeedback() {
    const input = document.getElementById('feedbackInput');
    if (input.value.trim() === "") {
        alert("请输入你的疑惑后再提交哦~");
        return;
    }
    // 这里可以后续对接后端，现在只做弹窗提示
    document.getElementById('successModal').style.display = "block";
    // 清空输入框
    input.value = "";
}

function closeModal() {
    document.getElementById('successModal').style.display = "none";
}

// ========== 原计算器JS（原样不动） ==========
function calculate() {
    document.getElementById('result').innerText = "";
    const canvas = document.getElementById('chart');
    const ctx = canvas.getContext('2d');
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    ctx.clearRect(0,0,canvas.width,canvas.height);

    try {
        const L = Number(document.getElementById('L').value);
        const H = Number(document.getElementById('H').value);
        const D = Number(document.getElementById('D').value);
        const g = Number(document.getElementById('g').value);
        const pi = 3.14159265;

        const d0 = Number(document.getElementById('d0').value);
        const d_arr = [
            Number(document.getElementById('d1').value),
            Number(document.getElementById('d2').value),
            Number(document.getElementById('d3').value),
            Number(document.getElementById('d4').value),
            Number(document.getElementById('d5').value)
        ];
        const d_raw = d_arr.reduce((a,b)=>a+b,0) / d_arr.length;
        const d_correct = d_raw - d0;
        const d = Math.round(d_correct * 1000) / 1000;

        // 直径A类不确定度
        const n_d = d_arr.length;
        let sum_d2 = 0;
        d_arr.forEach(val => sum_d2 += (val - d_raw)**2);
        const s_d = Math.sqrt(sum_d2 / (n_d - 1));
        const uA_d = s_d / Math.sqrt(n_d);

        // 直径B类不确定度
        const delta_ins_d = 0.004;
        const uB_d = delta_ins_d / Math.sqrt(3);

        // 直径合成不确定度
        const u_d = Math.sqrt(uA_d**2 + uB_d**2);

        const m = document.getElementById('m_list').value.split(',').map(Number).filter(n=>!isNaN(n));
        const add = document.getElementById('add_list').value.split(',').map(Number).filter(n=>!isNaN(n));
        const sub = document.getElementById('sub_list').value.split(',').map(Number).filter(n=>!isNaN(n));

        if(m.length!==add.length || add.length!==sub.length || m.length<2){
            throw new Error("数据长度不一致！");
        }

        const x_mean = add.map((_,i) => (add[i]+sub[i])/2);
        const F = m.map(mi => mi * g);

        const n = F.length;
        let sumF=0, sumX=0, sumFX=0, sumF2=0;
        for(let i=0; i<n; i++){
            sumF += F[i];
            sumX += x_mean[i];
            sumFX += F[i] * x_mean[i];
            sumF2 += F[i]**2;
        }
        const k = (n*sumFX - sumF*sumX) / (n*sumF2 - sumF**2);
        const intercept = (sumX/n) - k*(sumF/n);

        // 斜率不确定度
        let S = 0;
        for(let i=0; i<n; i++){
            const x_pred = k*F[i] + intercept;
            S += (x_mean[i] - x_pred)**2;
        }
        const s_x = Math.sqrt(S/(n-2));
        const meanF = sumF/n;

    function copyQuestion(text) {

    function getRandomQuestions() {
        const box = document.getElementById("questionBox");
        box.innerHTML = "";
        const shuffleList = [...questionBank].sort(() => 0.5 - Math.random());
        const selectList = shuffleList.slice(0, 5);

        selectList.forEach((item, idx) => {
            const div = document.createElement("div");
            div.className = "q-item";
            div.innerText = `${idx + 1}. ${item}`;
            div.onclick = () => copyQuestion(item);
            box.appendChild(div);
        });
    }
