<script>
function calculate() {
    document.getElementById('result').innerText = "";
    const canvas = document.getElementById('chart');
    const ctx = canvas.getContext('2d');
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    ctx.clearRect(0,0,canvas.width,canvas.height);

    try {
        const L = Number(document.getElementById('L').value);
        const H = Number(document.getElementById('H').value);
        const D = Number(document.getElementById('D').value);
        const g = Number(document.getElementById('g').value);
        const pi = 3.14159265;

        const d0 = Number(document.getElementById('d0').value);
        const d_arr = [
            Number(document.getElementById('d1').value),
            Number(document.getElementById('d2').value),
            Number(document.getElementById('d3').value),
            Number(document.getElementById('d4').value),
            Number(document.getElementById('d5').value)
        ];
        const d_raw = d_arr.reduce((a,b)=>a+b,0) / d_arr.length;
        const d_correct = d_raw - d0;
        const d = Math.round(d_correct * 1000) / 1000;

        // 直径A类不确定度
        const n_d = d_arr.length;
        let sum_d2 = 0;
        d_arr.forEach(val => sum_d2 += (val - d_raw)**2);
        const s_d = Math.sqrt(sum_d2 / (n_d - 1));
        const uA_d = s_d / Math.sqrt(n_d);

        // 直径B类不确定度（螺旋测微器仪器误差0.004mm）
        const delta_ins_d = 0.004;
        const uB_d = delta_ins_d / Math.sqrt(3);

        // 直径合成不确定度
        const u_d = Math.sqrt(uA_d**2 + uB_d**2);

        const m = document.getElementById('m_list').value.split(',').map(Number).filter(n=>!isNaN(n));
        const add = document.getElementById('add_list').value.split(',').map(Number).filter(n=>!isNaN(n));
        const sub = document.getElementById('sub_list').value.split(',').map(Number).filter(n=>!isNaN(n));

        if(m.length!==add.length || add.length!==sub.length || m.length<2){
            throw new Error("数据长度不一致！");
        }

        const x_mean = add.map((_,i) => (add[i]+sub[i])/2);
        const F = m.map(mi => mi * g);

        const n = F.length;
        let sumF=0, sumX=0, sumFX=0, sumF2=0;
        for(let i=0; i<n; i++){
            sumF += F[i];
            sumX += x_mean[i];
            sumFX += F[i] * x_mean[i];
            sumF2 += F[i]**2;
        }
        const k = (n*sumFX - sumF*sumX) / (n*sumF2 - sumF**2);
        const intercept = (sumX/n) - k*(sumF/n);

        // 斜率不确定度
        let S = 0;
        for(let i=0; i<n; i++){
            const x_pred = k*F[i] + intercept;
            S += (x_mean[i] - x_pred)**2;
        }
        const s_x = Math.sqrt(S/(n-2));
        const meanF = sumF/n;
        let sumF_dev2 = 0;
        F.forEach(f => sumF_dev2 += (f - meanF)**2);
        const u_k = s_x / Math.sqrt(sumF_dev2);
   
        // 杨氏模量计算
        const E_nmm2 = (8 * L * H) / (pi * d**2 * D * k);
        const E_gpa = E_nmm2 / 1000;


        //L、H、D：。单次测量，A类不确定度 = 0
        const uA_L = 0;
        const uA_H = 0;
        const uA_D = 0;

        //B类不确定度
        const delta_LH = 0.5;
        const uB_L = delta_LH / Math.sqrt(3);
        const uB_H = delta_LH / Math.sqrt(3);

        const delta_D = 0.02;
        const uB_D = delta_D / Math.sqrt(3);

        //合成不确定度 u = √(uA²+uB²)
        const u_L = Math.sqrt(uA_L**2 + uB_L**2);
        const u_H = Math.sqrt(uA_H**2 + uB_H**2);
        const u_D = Math.sqrt(uA_D**2 + uB_D**2);

        //相对不确定度
        const ur_L = u_L / L;
        const ur_H = u_H / H;
        const ur_D = u_D / D;

        // 杨氏模量相对不确定度 + 合成不确定度
       
        const ur_d = u_d / d;
        const ur_k = u_k / k;
        const ur_E = Math.sqrt(ur_L**2 + ur_H**2 + ur_D**2 + (2*ur_d)**2 + ur_k**2);
        const u_E = E_gpa * ur_E;
        const u_E_nmm2 = E_nmm2 * ur_E;

        // 扩展不确定度 k=2
        const U_E = (2 * u_E).toFixed(2);
        const U_E_nmm2 = (2 * u_E_nmm2).toFixed(2);

        let res = `
-----（一）基础几何参数模块-------
✅ 金属丝原长 L：${L.toFixed(1)} mm
✅ 镜尺距 H：${H.toFixed(1)} mm
✅ 光杠杆常数 D：${D.toFixed(2)} mm
✅ 直径零点读数 d0：${d0.toFixed(3)} mm
✅ 直径测量平均值：${d_raw.toFixed(3)} mm
✅ 修正后直径 d：${d.toFixed(3)} mm
-----（二）直径不确定度模块--------
📏 直径A类不确定度 uA(d)：${uA_d.toFixed(4)} mm
📏 直径B类不确定度 uB(d)：${uB_d.toFixed(4)} mm
📏 直径合成不确定度 u(d)：${u_d.toFixed(4)} mm
-----（三）拟合参数模块-------------
✅ 最小二乘法斜率 k：${k.toFixed(6)} mm/N
✅ 斜率不确定度 u(k)：${u_k.toFixed(6)} mm/N
✅ 截距 b：${intercept.toFixed(3)} mm
-----（四）杨氏模量与不确定度模块----
✅ 杨氏模量 E：${E_nmm2.toFixed(2)} N/mm² ≈ ${E_gpa.toFixed(2)} GPa
✅ 合成标准不确定度 u(E)：${u_E.toFixed(2)} GPa
✅ 扩展不确定度 U（k=2）：${U_E} GPa
-----（五）最终结果模块------------
🎯 最终实验结果：
   E = （${E_gpa.toFixed(2)} ± ${U_E}） GPa
   E = （${E_nmm2.toFixed(2)} ± ${U_E_nmm2}） N/mm²
        `;
        document.getElementById('result').innerText = res;

        // ====================== 绘图：坐标完全对齐 ======================
        const W = canvas.width;
        const H_canvas = canvas.height;
        const pad = 80;
        const axisW = W - 2*pad;
        const axisH = H_canvas - 2*pad;

        // 固定坐标轴（规整刻度：0 10 20...）
        const F_axis_min = 0;
        const F_axis_max = 100;
        const X_axis_min = 10;
        const X_axis_max = 40;

        // 坐标映射（点位置与刻度严格对应）
        function fx(f) { return pad + (f - F_axis_min) / (F_axis_max - F_axis_min) * axisW; }
        function fy(x) { return H_canvas - pad - (x - X_axis_min) / (X_axis_max - X_axis_min) * axisH; }

        // 网格
        ctx.strokeStyle = '#eee';
        ctx.lineWidth = 1;
        for(let i=0; i<=6; i++){
            let x = pad + axisW/6*i;
            ctx.beginPath(); ctx.moveTo(x, pad); ctx.lineTo(x, H_canvas-pad); ctx.stroke();
        }
        for(let i=0; i<=6; i++){
            let y = pad + axisH/6*i;
            ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(W-pad, y); ctx.stroke();
        }

        // 坐标轴
        ctx.strokeStyle = '#333'; ctx.lineWidth=2;
        ctx.beginPath();
        ctx.moveTo(pad, H_canvas-pad); ctx.lineTo(W-pad, H_canvas-pad);
        ctx.moveTo(pad, pad); ctx.lineTo(pad, H_canvas-pad);
        ctx.stroke();

        // ====================== 规整刻度 ======================
        ctx.fillStyle = '#333';
        ctx.font = '14px Arial';

        // X轴：0 10 20 ... 100
        for(let v=F_axis_min; v<=F_axis_max; v+=10){
            let x = fx(v);
            ctx.fillText(v, x-8, H_canvas-pad+22);
        }

        // Y轴：10 15 20 ... 40
        for(let v=X_axis_min; v<=X_axis_max; v+=5){
            let y = fy(v);
            ctx.fillText(v, pad-40, y+5);
        }

        // ====================== 实验点 + 坐标标注 ======================
        ctx.fillStyle = '#007bff';
        F.forEach((fi,i)=>{
            let x = fx(fi);
            let y = fy(x_mean[i]);
            ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2); ctx.fill();
            ctx.fillStyle = '#333';
            ctx.font = '11px Arial';
            ctx.fillText(`(${fi.toFixed(1)}, ${x_mean[i].toFixed(1)})`, x+8, y-8);
            ctx.fillStyle = '#007bff';
        });

        // ====================== 拟合直线 ======================
        ctx.strokeStyle = '#dc3545'; ctx.lineWidth=2;
        ctx.beginPath();
        ctx.moveTo(fx(F_axis_min), fy(k*F_axis_min + intercept));
        ctx.lineTo(fx(F_axis_max), fy(k*F_axis_max + intercept));
        ctx.stroke();

        // ====================== 图上直接标注拟合方程 ======================
        ctx.fillStyle = '#dc3545';
        ctx.font = 'bold 15px Microsoft YaHei';
        ctx.fillText(`拟合方程：x = ${k.toFixed(2)}F + ${intercept.toFixed(2)}`, pad + 20, pad + 60);

        // 标签
        ctx.fillStyle = '#222'; ctx.font='15px Microsoft YaHei';
        ctx.fillText('受力 F (N)', W/2-25, H_canvas-25);
        ctx.save();
        ctx.translate(30, H_canvas/2); ctx.rotate(-Math.PI/2);
        ctx.fillText('刻度读数 x (mm)',0,0);
        ctx.restore();

        // 图例
        ctx.fillStyle='#007bff'; ctx.fillRect(pad+15,pad+15,10,10);
        ctx.fillStyle='#333'; ctx.fillText('实验数据',pad+32,pad+23);
        ctx.strokeStyle='#dc3545'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(pad+15,pad+40); ctx.lineTo(pad+25,pad+40); ctx.stroke();
        ctx.fillText('最小二乘拟合',pad+32,pad+42);

        ctx.font='bold 17px Microsoft YaHei';
        ctx.fillStyle = '#222';
        ctx.fillText('F - x 关系曲线', W/2-70, 30);

    } catch(e) {
        document.getElementById('result').innerText = "❌ 错误："+e.message;
    }
}
</script>

- 钢卷尺（精度1mm）
- 数字拉力计、LED标尺

## 四、核心物理量定义（标准定义）
- D：光杠杆常数，定义为光杠杆后足尖到前两足连线的垂直距离。
- H：镜尺距，定义为光杠杆反射镜转轴到发光标尺的垂直距离。
- Δx：标尺刻度变化量，定义为经光杠杆放大后，望远镜中观测到的标尺读数变化量。
- θ：光杠杆偏转角，定义为金属丝伸长时，光杠杆反射镜转过的微小角度。
- M：光杠杆放大倍数，定义为光杠杆将微小伸长量ΔL放大为Δx的倍率，M=2H/D。

## 五、核心原理
### 1. 杨氏模量定义
$$E=\\frac{\\sigma}{\\varepsilon}=\\frac{F/S}{\\Delta L/L}$$
S=πd²/4

### 2. 光杠杆放大原理
- 几何关系：$\\Delta L = \\frac{D}{2H} \\cdot \\Delta x$
- 放大倍数：$M = \\frac{2H}{D}$

### 3. 最终公式
$$E=\\frac{8FLH}{\\pi d^2 D \\Delta x}$$

## 六、实验步骤
1. 调平仪器，拉直金属丝；
2. 调节望远镜：粗调共轴、细调清晰、消视差；
3. 测L、H、D；
4. 千分尺测直径5次；
5. 加砝码（3→10kg）记录标尺；
6. 减砝码记录标尺；
7. 取平均、逐差法/最小二乘法处理；
8. 计算E并分析误差。

## 七、数据处理
1. 直径取平均；
2. 加减读数取平均；
3. 逐差法：消除系统误差、提高精度；
4. 最小二乘法：拟合F-x直线求斜率k；
5. E=8gLH/(πd²Dk)

## 八、误差来源
1. 金属丝直径不均、千分尺读数误差；
2. 光杠杆未放平、镜面倾斜；
3. 望远镜视差、读数视差；
4. 金属丝弯曲、未竖直；
5. 砝码质量误差、振动影响；
6. 温度影响。

## 九、逐差法
分组：前4、后4
对应项相减，求平均Δx，消除线性误差

## 十、最小二乘法
拟合F=kx+b，k为劲度系数，E与k成反比

# ===================== 深度物理思考体系（AI 举一反三、自由推理）=====================
## 一、实验核心物理本质
1. 必须保证金属丝处于**纯弹性形变范围**，胡克定律 F=kΔL 严格成立；
2. 光杠杆的作用是**线性放大微小位移**，ΔL 与 Δx 必须保持严格线性；
3. 所有操作规范、仪器选择、数据处理，均围绕：**保线性、消误差、提精度**。

## 二、操作逻辑（为什么要/不要做某件事）
- 预拉金属丝：消除弯曲松弛，保证纯弹性形变；
- 加减力双向测量：消除机械回程间隙误差；
- 禁止回旋螺母：避免破坏拉力与位移的线性关系；
- 禁止震动：光杠杆对微位移极敏感，震动直接导致读数失真；
- 禁止中途调望远镜：光路与放大系统固定，调节会让全部数据失效；
- 多位置测直径：金属丝非正圆，d²对结果影响极大，必须减小系统误差；
- 拉力不超上限：防止进入塑性形变，使公式完全失效。

## 三、仪器选择逻辑（量程 + 精度匹配）
- L、H 大尺寸 → 钢卷尺（量程足够）
- D 中等尺寸 → 游标卡尺（精度匹配）
- d 微小尺寸 → 螺旋测微器（高精度必需）
- 微小形变 → 光杠杆放大（30~50倍）
- 光路观测 → 望远镜（消视差、精准读数）

## 四、误差分析逻辑
- 系统误差：仪器倾斜、直径不均、间隙、光路偏移（可消除）
- 随机误差：震动、读数偏差、环境干扰（可减小）

## 五、数据处理逻辑
- 逐差法 / 线性拟合：充分利用数据、消除线性系统误差、验证胡克定律
- 简单平均：丢失线性关系，精度低，不推荐使用
